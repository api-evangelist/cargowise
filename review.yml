actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. CargoWise's asynchronous delivery is a
    SOAP webhook (eAdaptor Outbound Service) to a single per-tenant listener, and
    its inbound surface is RESTful XML - both gated behind module purchase and
    partner certification. No AsyncAPI document was created because there is no
    documented server-push streaming transport and no publicly published event
    schema to model without fabrication. apis.yml captures the eAdaptor inbound,
    eAdaptor outbound, Universal Shipment, Universal Event, and REST (eAdaptor
    Next / xHub) surfaces with endpointsModeled noted.
