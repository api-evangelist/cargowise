name: CargoWise
kind: company
description: >-
  CargoWise is WiseTech Global's logistics execution platform - a single-database
  ERP for international freight forwarding, customs, warehousing, transport, and
  landside logistics. Its integration surface is delivered primarily through
  eAdaptor, which pairs a RESTful XML inbound service (push, query, add, and update
  records) with a SOAP-based outbound service (a webhook equivalent that emits
  messages on milestones). Payloads use CargoWise's Universal XML schemas -
  Universal Shipment (XUS), Universal Event (XUE), and Universal Transaction - or
  the legacy Native XML format. Newer REST integration (eAdaptor Next / xHub) adds
  OAuth 2.0 authorization-code access. The integration API is real but heavily
  gated - the eAdaptor Developers Guide and endpoint details are released only
  after a customer purchases the eAdaptor modules, and partner access runs through
  WiseTech accreditation and certification. Endpoints below are modeled from public
  developer references; the authoritative specification is not publicly published.
